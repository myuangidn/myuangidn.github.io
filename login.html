<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyUang - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { 'almost-white': '#efefef', 'pastel-blue': '#304674' }, fontFamily: { 'poppins': ['Poppins', 'sans-serif'] }, boxShadow: { 'soft': '0 10px 40px -10px rgba(48, 70, 116, 0.15)' } }
            }
        }
    </script>
</head>
<body class="bg-almost-white h-screen flex flex-col items-center justify-center font-poppins relative overflow-hidden">

    <div class="absolute top-0 left-0 w-96 h-96 bg-pastel-blue opacity-5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 bg-blue-300 opacity-10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

    <div class="w-full max-w-md px-6 relative z-10">
        <div id="login-page">
            <div class="text-center mb-10">
                <img src="image/logo.png" alt="Logo Platform" class="w-20 h-20 rounded-2xl mx-auto mb-4 shadow-soft object-cover">
                <h2 class="text-3xl font-bold text-pastel-blue">Welcome Back!</h2>
                <p class="text-gray-400 text-sm mt-2">Login dulu biar keuangan aman, Boss.</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div class="bg-white p-1 rounded-2xl shadow-sm"><input type="email" id="login-email" placeholder="Email Address" class="w-full bg-transparent p-4 outline-none text-gray-700 placeholder-gray-400" required></div>
                <div class="bg-white p-1 rounded-2xl shadow-sm"><input type="password" id="login-password" placeholder="Password" class="w-full bg-transparent p-4 outline-none text-gray-700 placeholder-gray-400" required></div>
                <p id="login-error" class="text-red-500 text-xs text-center hidden"></p>
                <button type="submit" class="w-full bg-pastel-blue text-white font-semibold py-4 rounded-2xl shadow-soft hover:shadow-lg transition-all transform active:scale-95">Log In</button>
            </form>
            
            <div class="text-center mt-8">
                <p class="text-sm text-gray-400">Belum punya akun? <a href="register.html" class="text-pastel-blue font-semibold hover:underline">Daftar sini</a></p>
                <a href="index.html" class="block mt-6 text-xs text-gray-300 hover:text-gray-500">← Back to Landing</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://pmuufdztdkaiblyflmij.supabase.co';
        const supabaseKey = 'sb_publishable_M-JFpIm9PKoJjnyLSqxQWQ_cD1_vOeG';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        function redirectUser() { window.location.href = 'mainapp.html'; }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Loading...'; btn.disabled = true;

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            btn.innerText = originalText; btn.disabled = false;

            if (error) {
                errorEl.textContent = error.message;
                errorEl.classList.remove('hidden');
            } else {
                redirectUser();
            }
        });

        window.onload = async () => {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) redirectUser();
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
