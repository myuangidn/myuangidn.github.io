<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyUang - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { 'almost-white': '#efefef', 'pastel-blue': '#304674' }, fontFamily: { 'poppins': ['Poppins', 'sans-serif'] }, boxShadow: { 'soft': '0 10px 40px -10px rgba(48, 70, 116, 0.15)' } }
            }
        }
    </script>
</head>
<body class="bg-almost-white h-screen flex flex-col items-center justify-center font-poppins relative overflow-hidden">

    <div class="absolute top-0 left-0 w-96 h-96 bg-pastel-blue opacity-5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 bg-blue-300 opacity-10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

    <div class="w-full max-w-md px-6 relative z-10">
        <div id="register-page">
             <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-pastel-blue">New Account</h2>
                <p class="text-gray-400 text-sm mt-2">Gabung MyUang sekarang.</p>
            </div>
            <form id="register-form" class="space-y-4">
                <div class="bg-white p-1 rounded-2xl shadow-sm"><input type="text" id="register-name" placeholder="Full Name" class="w-full bg-transparent p-4 outline-none text-gray-700 placeholder-gray-400" required></div>
                <div class="bg-white p-1 rounded-2xl shadow-sm"><input type="email" id="register-email" placeholder="Email Address" class="w-full bg-transparent p-4 outline-none text-gray-700 placeholder-gray-400" required></div>
                <div class="bg-white p-1 rounded-2xl shadow-sm"><input type="password" id="register-password" placeholder="Password" class="w-full bg-transparent p-4 outline-none text-gray-700 placeholder-gray-400" required></div>
                
                <div class="w-full bg-gray-100 p-4 rounded-2xl text-gray-400 flex justify-between items-center cursor-not-allowed opacity-70">
                    <span>Indonesia (IDR)</span>
                    <i class="fa-solid fa-lock text-xs"></i>
                </div>

                <p id="register-error" class="text-red-500 text-xs text-center hidden"></p>
                <button type="submit" class="w-full bg-pastel-blue text-white font-semibold py-4 rounded-2xl shadow-soft hover:shadow-lg transition-all transform active:scale-95">Register</button>
            </form>
            
            <div class="text-center mt-6">
                <p class="text-sm text-gray-400">Sudah punya akun? <a href="login.html" class="text-pastel-blue font-semibold hover:underline">Log In</a></p>
                <a href="index.html" class="block mt-6 text-xs text-gray-300 hover:text-gray-500">← Back to Landing</a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://pmuufdztdkaiblyflmij.supabase.co';
        const supabaseKey = 'sb_publishable_M-JFpIm9PKoJjnyLSqxQWQ_cD1_vOeG';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Loading...'; btn.disabled = true;

            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const errorEl = document.getElementById('register-error');

            const { data, error } = await supabaseClient.auth.signUp({
                email, password,
                options: { data: { full_name: name } }
            });
            
            btn.innerText = originalText; btn.disabled = false;

            if (error) {
                errorEl.textContent = error.message;
                errorEl.classList.remove('hidden');
            } else {
                alert('Registrasi sukses! Silakan login.');
                window.location.href = 'login.html';
            }
        });

        window.onload = async () => {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) window.location.href = 'mainapp.html';
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
